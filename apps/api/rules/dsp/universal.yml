# Universal rules — applied to all DSPs regardless of target platform.
# id convention: universal.<layer>.<slug>

version: "1.0.0"
dsp: null

rules:
  # ── Metadata layer ──────────────────────────────────────────────────────────
  - id: universal.metadata.release_title_required
    layer: metadata
    title: Release title is required
    description: Every release must have a non-empty title field.
    severity: critical
    category: basic_metadata
    fix_hint: Populate the release title in your delivery manifest.
    doc_url: null
    active: true

  - id: universal.metadata.artist_name_required
    layer: metadata
    title: Artist name is required
    description: A primary artist name must be present on the release.
    severity: critical
    category: basic_metadata
    fix_hint: Add a primary artist contributor to the release.
    doc_url: null
    active: true

  - id: universal.metadata.upc_format
    layer: metadata
    title: UPC must be 12 or 13 digits
    description: The UPC/EAN barcode must consist of exactly 12 or 13 numeric digits.
    severity: critical
    category: identifiers
    fix_hint: Obtain a valid UPC from your distributor and re-submit.
    doc_url: null
    active: true

  - id: universal.metadata.isrc_format
    layer: metadata
    title: ISRC must follow ISO 3901 format
    description: >
      Each track ISRC must match the pattern CC-XXX-YY-NNNNN
      (country, registrant, year, designation).
    severity: critical
    category: identifiers
    fix_hint: "Correct the ISRC to ISO 3901 format, e.g. US-ABC-23-00001."
    doc_url: https://isrc.ifpi.org/en/isrc-standard/structure
    active: true

  - id: universal.metadata.release_date_not_in_past
    layer: metadata
    title: Release date should not be in the past
    description: >
      Submitting a release with a past release date may cause DSP ingestion
      delays or rejection. Verify the intended street date.
    severity: warning
    category: scheduling
    fix_hint: Update the release date to a future date or confirm the backdated release is intentional.
    doc_url: null
    active: true

  - id: universal.metadata.genre_required
    layer: metadata
    title: Primary genre is required
    description: At least one genre must be specified for the release.
    severity: warning
    category: classification
    fix_hint: Select a primary genre from the platform-supported genre list.
    doc_url: null
    active: true

  # ── Audio layer ─────────────────────────────────────────────────────────────
  - id: universal.audio.sample_rate_minimum
    layer: audio
    title: Audio sample rate must be at least 44100 Hz
    description: Delivered audio files must have a sample rate of 44.1 kHz or higher.
    severity: critical
    category: audio_quality
    fix_hint: Re-export your audio at 44100 Hz or 48000 Hz.
    doc_url: null
    active: true

  - id: universal.audio.bit_depth_minimum
    layer: audio
    title: Bit depth must be at least 16-bit
    description: Audio files must be encoded at 16-bit or higher bit depth.
    severity: critical
    category: audio_quality
    fix_hint: Re-export at 16-bit (CD quality) or 24-bit (hi-res).
    doc_url: null
    active: true

  - id: universal.audio.duration_mismatch
    layer: audio
    title: Track duration matches metadata
    description: >
      The actual audio duration must be within 2 seconds of the duration
      declared in the delivery manifest.
    severity: warning
    category: audio_quality
    fix_hint: Update the manifest duration or trim/pad the audio file to match.
    doc_url: null
    active: true

  - id: universal.audio.silence_at_start
    layer: audio
    title: No excessive silence at start of track
    description: Tracks must not begin with more than 2 seconds of silence.
    severity: info
    category: audio_quality
    fix_hint: Trim leading silence from the audio file.
    doc_url: null
    active: true

  # ── Artwork layer ───────────────────────────────────────────────────────────
  - id: universal.artwork.minimum_resolution
    layer: artwork
    title: Artwork minimum resolution 3000×3000 px
    description: Release artwork must be at least 3000×3000 pixels.
    severity: critical
    category: artwork
    fix_hint: Re-export artwork at 3000×3000 px or higher.
    doc_url: null
    active: true

  - id: universal.artwork.must_be_square
    layer: artwork
    title: Artwork must be square (1:1 aspect ratio)
    description: Width and height of the cover art image must be equal.
    severity: critical
    category: artwork
    fix_hint: Crop or re-export the image to a 1:1 aspect ratio.
    doc_url: null
    active: true

  - id: universal.artwork.format_must_be_jpeg_or_png
    layer: artwork
    title: Artwork must be JPEG or PNG
    description: Only JPEG and PNG formats are accepted for cover art.
    severity: critical
    category: artwork
    fix_hint: Convert artwork to JPEG (preferred) or PNG.
    doc_url: null
    active: true

  - id: universal.artwork.no_text_overlay
    layer: artwork
    title: Artwork should not contain explicit pricing or website text
    description: >
      Artwork containing URLs, prices, or promotional text is typically
      rejected by DSPs.
    severity: warning
    category: artwork
    fix_hint: Remove URLs, prices, and promotional copy from the artwork.
    doc_url: null
    active: true
